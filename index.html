<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Musketeers</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#3d1f28,#5b2d3c);
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}


.screen{
    width:100%;
    max-width:420px;
    padding:20px;
    text-align:center;
    position:relative;
}


.envelope-container{
    display:flex;
    flex-direction:column;
    align-items:center;
    animation:fadeIn 2s;
}

.envelope{
    width:220px;
    height:140px;
    background:#ff5c8a;
    position:relative;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 0 30px rgba(0,0,0,0.3);
    animation:floatEnvelope 2s infinite ease-in-out;
}

.envelope::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    width:0;
    height:0;
    border-left:110px solid transparent;
    border-right:110px solid transparent;
    border-top:80px solid #ff9ab5;
}

@keyframes floatEnvelope{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0);
    }

}

.question{
    margin-top:30px;
    font-size:24px;
    font-weight:bold;
    line-height:1.5;
}


.buttons{
    margin-top:25px;
    display:flex;
    justify-content:center;
    gap:20px;
}

button{
    padding:12px 28px;
    border:none;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

.yes-btn{
    background:white;
    color:#ff4f81;
}

.no-btn{
    background:#ffb3c7;
    color:white;
}

button:hover{
    transform:scale(1.1);
}


#loveContent{
    display:none;
    animation:fadeIn 2s;
}

.family-photo{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:50%;
    border:5px solid rgb(63, 43, 43);
    margin:20px auto;
    display:block;
    box-shadow:0 0 35px rgba(255,255,255,0.8);
    animation:photoGlow 2s infinite alternate;
}

@keyframes photoGlow{

    from{
        transform:scale(1);
        box-shadow:0 0 20px rgba(255,255,255,0.5);
    }

    to{
        transform:scale(1.05);
        box-shadow:0 0 40px rgba(255,255,255,1);
    }

}
*/

.typing{
    margin-top:30px;
    font-size:20px;
    font-weight:bold;
    white-space:nowrap;
    overflow:hidden;
    border-right:3px solid white;
    width:0;
    animation:
    typing 6s steps(60,end) forwards,
    blink .8s infinite;
}

@keyframes typing{

    from{
        width:0;
    }

    to{
        width:100%;
    }

}

@keyframes blink{

    50%{
        border-color:transparent;
    }

}


.note{
    margin-top:25px;
    font-size:17px;
    background:rgba(255,255,255,0.2);
    padding:18px;
    border-radius:20px;
    line-height:1.7;
    backdrop-filter:blur(5px);
}


.floating-heart{
    position:absolute;
    font-size:24px;
    animation:float 8s linear infinite;
    opacity:0.7;
}

@keyframes float{

    0%{
        transform:translateY(100vh);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        transform:translateY(-120vh);
        opacity:0;
    }

}


@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}


@media(max-width:480px){

    .typing{
        font-size:16px;
    }

    .question{
        font-size:20px;
    }

   .family-photo{
    width:170px;
    height:170px;
}

    .note{
        font-size:15px;
    }

}

</style>
</head>

<body>


<audio autoplay loop>
    <source src="Care - Sonder (144p, h264).mp4" type="audio/mpeg">
</audio>

<div class="screen">


    <div id="envelopeSection" class="envelope-container">

        <div class="envelope"></div>

        <div class="question">
            The Musketeers❤️
        </div>

        <div class="buttons">

            <button class="yes-btn" onclick="showLove()">
                Open
            </button>

            <button class="no-btn" id="noBtn" onclick="changeButton()">
                No
            </button>

        </div>

    </div>


    <div id="loveContent">


        <img src="Princess jafe.jpeg" alt="Family Photo" class="family-photo">

        <div class="typing">
            Mom, Dad & Bambi.I love you all so much
        </div>

        <div class="note">
            Thank you for always being there for me,
            supporting me, protecting me, and loving me.
            I appreciate every hug, every laugh,
            and every moment we share together.
            Always know that I love you endlessly ❤️
        </div>

    </div>

</div>


<div class="floating-heart" style="left:10%; animation-delay:0s;">💕</div>
<div class="floating-heart" style="left:25%; animation-delay:2s;">❤️</div>
<div class="floating-heart" style="left:40%; animation-delay:4s;">💖</div>
<div class="floating-heart" style="left:60%; animation-delay:1s;">💕</div>
<div class="floating-heart" style="left:75%; animation-delay:3s;">❤️</div>
<div class="floating-heart" style="left:90%; animation-delay:5s;">💖</div>

<script>


function changeButton(){

    let noBtn = document.getElementById("noBtn");

    noBtn.innerHTML = "Open ❤️";

    noBtn.classList.remove("no-btn");

    noBtn.classList.add("yes-btn");

    noBtn.setAttribute("onclick","showLove()");
}

function showLove(){

    document.getElementById("envelopeSection").style.display = "none";

    document.getElementById("loveContent").style.display = "block";
}

</script>

</body>
</html>
